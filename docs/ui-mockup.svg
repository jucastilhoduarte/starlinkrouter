<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:0"/>
    </radialGradient>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22c55e" flood-opacity="0.35"/>
    </filter>
    <filter id="dotGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22c55e" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Screen background -->
  <rect width="840" height="360" rx="8" fill="#0d0d1a"/>
  <rect width="840" height="360" rx="8" fill="url(#bgGlow)"/>
  <rect width="840" height="360" rx="8" fill="none" stroke="#2d2d3d" stroke-width="2"/>

  <!-- Logo: estrela irradiando arcos Wi-Fi (somente o logo, maior, centralizado) -->
  <g transform="translate(420,95) scale(1.7) translate(-420,-95)">
    <!-- estrela 5 pontas centrada em 420,106 -->
    <path d="M420,99 L421.9,103.8 L427,104.2 L423.3,107.5 L424.5,112.5 L420,109.8 L415.5,112.5 L416.7,107.5 L413,104.2 L418.1,103.8 Z" fill="#F59E0B"/>
    <!-- arc 1 -->
    <path d="M409 97 Q420 89 431 97" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- arc 2 -->
    <path d="M400 89 Q420 75 440 89" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- arc 3 -->
    <path d="M391 81 Q420 62 449 81" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.35"/>
  </g>

  <!-- Toggle button -->
  <rect x="290" y="152" width="260" height="72" rx="14" fill="url(#btnGrad)" filter="url(#btnShadow)"/>
  <text x="420" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="4">LIGADO</text>
  <text x="420" y="212" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" letter-spacing="1">toque para desligar</text>

  <!-- Route chip -->
  <rect x="305" y="240" width="230" height="28" rx="14" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.28)" stroke-width="1"/>
  <circle cx="328" cy="254" r="5" fill="#22c55e" filter="url(#dotGlow)"/>
  <text x="340" y="258" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#86efac" letter-spacing="0.5">Trafegando via Starlink</text>

  <!-- Botão Logs (ícone à esquerda, texto à direita) -->
  <rect x="314" y="294" width="70" height="34" rx="9" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- ícone lista -->
  <line x1="324" y1="307" x2="336" y2="307" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="324" y1="311" x2="334" y2="311" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="324" y1="315" x2="332" y2="315" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="344" y="315" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.5">Logs</text>

  <!-- Botão Configurações (ícone à esquerda, texto à direita) -->
  <rect x="396" y="294" width="130" height="34" rx="9" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- ícone engrenagem simples -->
  <circle cx="410" cy="311" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="410" cy="311" r="2" fill="#94a3b8"/>
  <text x="422" y="315" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.5">Configurações</text>

  <!-- Ratio label -->
  <text x="828" y="352" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#2a2a3a" letter-spacing="1">21:9 · StarHouter v1</text>
</svg>
